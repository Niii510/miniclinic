<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 400px; margin: 60px auto; padding: 20px; background-color: #F8FAFC; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: #0F2443; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #475569; }
        input { width: 100%; padding: 10px; border: 1px solid #CBD5E1; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #14B8A6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .error { color: #EF4444; background: #FEE2E2; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; }
        .success { color: #10B981; background: #D1FAE5; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #64748B; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>修改密碼</h1>
        
        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${success}" class="success" th:text="${success}"></div>

        <form th:action="@{/password}" method="post">
            <div class="form-group">
                <label>舊密碼</label>
                <input type="password" name="oldPassword" required>
            </div>
            <div class="form-group">
                <label>新密碼 (至少 8 碼)</label>
                <input type="password" name="newPassword" required minlength="8">
            </div>
            <div class="form-group">
                <label>確認新密碼</label>
                <input type="password" name="confirmPassword" required>
            </div>
            <button type="submit">更新密碼</button>
        </form>
        
        <a class="back-link" th:href="@{/dashboard}">← 返回控制台</a>
    </div>
</body>
</html>
