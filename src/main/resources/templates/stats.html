<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>統計資訊 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #334155; }
        header { border-bottom: 3px solid #14B8A6; padding-bottom: 12px; margin-bottom: 30px; }
        h1 { color: #0F2443; margin: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .stats-card { background: #F8FAFC; border: 1px solid #E2E8F0; padding: 20px; border-radius: 8px; text-align: center; }
        .stats-number { display: block; font-size: 2.5rem; font-weight: bold; color: #14B8A6; margin-bottom: 5px; }
        .stats-label { color: #64748B; font-weight: bold; }
        .dept-list { margin-top: 30px; }
        ul { list-style-type: none; padding: 0; display: flex; flex-wrap: wrap; gap: 10px; }
        li { background: #E2E8F0; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; }
        .back-link { display: block; text-align: center; margin-top: 40px; color: #14B8A6; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <h1>統計資訊</h1>
    </header>

    <div class="stats-grid">
        <div class="stats-card">
            <span class="stats-number" th:text="${totalDoctors}">0</span>
            <span class="stats-label">醫師總數</span>
        </div>
        <div class="stats-card">
            <span class="stats-number" th:text="${totalPatients}">0</span>
            <span class="stats-label">病患總數</span>
        </div>
        <div class="stats-card">
            <span class="stats-number" th:text="${totalAppointments}">0</span>
            <span class="stats-label">累計掛號數</span>
        </div>
    </div>

    <div class="dept-list">
        <h3>服務科別</h3>
        <ul>
            <li th:each="dept : ${departments}" th:text="${dept}">科別名稱</li>
        </ul>
    </div>

    <a th:href="@{/}" class="back-link">← 回首頁</a>
</body>
</html>
